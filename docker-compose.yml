version: '3.8'

services:
  mysql:
    build: .
    container_name: mysql_capstone
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: capstone_db
      MYSQL_USER: administrator
      MYSQL_PASSWORD: administrator2026
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - capstone_network

volumes:
  mysql_data:

networks:
  capstone_network:
    driver: bridge
